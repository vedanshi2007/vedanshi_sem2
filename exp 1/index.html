<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Result Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Result Calculator</h1>

        <label>Enter Number of Subjects:</label>
        <input type="number" id="subjects" min="1">

        <button onclick="getMarks()">Enter Marks</button>

        <div id="marksInput"></div>

        <button onclick="calculateResult()">Calculate Result</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
